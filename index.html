<!DOCTYPE html>
<html>
<head>
  <title>18+ Warning</title>
  <style>
    body {
      background-image: url(photo_2026-03-04_17-29-04.jpg);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 20px;
      font-family: Impact, Arial, sans-serif;
      color: white;
      text-align: center;
    }
    .big-text {
      font-size: 80px;
      color: red;
      -webkit-text-stroke: 1px white;
      margin: 20px 0 0 0;
    }
    .buttons {
      display: flex;
      gap: 20px;
    }
    .buttons button {
      background-size: cover;
      background-position: center;
      width: 150px;
      height: 60px;
      font-size: 30px;
      color: white;
      border: none;
      cursor: pointer;
      transition: transform 0.2s;
      -webkit-text-stroke: 0.8px black;
      font-family: Verdana, Geneva, Tahoma, sans-serif;
    }
    .buttons button:hover {
      transform: scale(1.1);
    }
    .warning-text {
      font-size: 20px;
      -webkit-text-stroke: 0.5px black;
      color: white;
    }
    .link {
      font-size: 20px;
      -webkit-text-stroke: 0.5px blue;
      color: white;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <p class="big-text">Click Next to Watch Video</p>

  <div class="buttons">
    <a onclick="window.location.href='about:blank'">
      <button style="background-image: url(photo_2026-03-04_17-29-01.jpg);">Return</button>
    </a>
    <a href="index2.html">
      <button style="background-image: url(photo_2026-03-04_17-28-57.jpg);">Next</button>
    </a>
  </div>

  <p style="font-size: 20px;">This Video Not For Kids</p>
  <a style="color: white; -webkit-text-stroke: 1p x blue" href="index1.html">Warning & Terms of Us</a>

</body>
</html>
